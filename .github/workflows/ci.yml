name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        
      - name: Use Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24.x"
          cache: "pnpm"

          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - run: pnpm build
      
      - run: pnpm lint
